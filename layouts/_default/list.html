{{ define "main" }}
<header class="post-header">
  <h1>{{ .Title | title }}</h1>
  <div class="post-header-meta">
    <span>{{ len .Pages }} {{ if eq (len .Pages) 1 }}entry{{ else }}entries{{ end }}</span>
  </div>
</header>

{{ range (.Pages.GroupByDate "2006") }}
<div class="post-year">{{ .Key }}</div>
<div class="post-list">
  {{ range .Pages }}
    {{ partial "post-card.html" . }}
  {{ end }}
</div>
{{ end }}
{{ end }}
