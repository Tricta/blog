{{ define "main" }}
<header class="list-header">
  <h1>{{ .Title | title }}</h1>
  <span class="list-header-meta">{{ len .Pages }} {{ if eq (len .Pages) 1 }}tag{{ else }}tags{{ end }}</span>
</header>

<ul class="term-list">
  {{ range .Pages.ByTitle }}
  <li>
    <a href="{{ .RelPermalink }}">
      <span class="term-name">{{ .Title }}</span>
      <span class="term-count">{{ len .Pages }}</span>
    </a>
  </li>
  {{ end }}
</ul>
{{ end }}
